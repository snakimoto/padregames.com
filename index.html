<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>padregames</title>
  <meta name="description" content="padregames — committed to your entertainment." />

  <!-- Retro pixel font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#000000;
      --fg:#e6f7ff;
      --muted:#9ad7ff;
      --neon:#00ffd5;
      --neon2:#ff2bd6;
      --card:#070707;
      --border:#1f1f1f;
    }

    html, body { height: 100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Press Start 2P", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.7;
      letter-spacing: 0.2px;
      overflow-x:hidden;
    }

    /* Subtle scanlines overlay */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.03),
          rgba(255,255,255,0.03) 1px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 6px
        );
      opacity:0.18;
      mix-blend-mode: screen;
      z-index:0;
    }

    /* Light CRT glow */
    body::after{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      background:
        radial-gradient(circle at 35% 20%, rgba(0,255,213,0.10), rgba(0,0,0,0) 55%),
        radial-gradient(circle at 70% 85%, rgba(255,43,214,0.08), rgba(0,0,0,0) 55%);
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    /* Top-left brand only */
    .topbar{
      display:flex;
      justify-content:flex-start;
      align-items:center;
      margin-bottom: 18px;
    }

    .brand{
      font-size: 12px;
      text-transform: lowercase;
      color: var(--fg);
      text-shadow: 0 0 12px rgba(0,255,213,0.18);
    }

    .grid{
      display:grid;
      gap: 12px;
      grid-template-columns: repeat(12, 1fr);
    }

    .panel{
      grid-column: span 12;
      border: 1px solid var(--border);
      background: #040404;
      padding: 18px;
      box-shadow: 0 0 0 2px rgba(0,0,0,1);
    }

    .panel p{
      margin: 0;
      font-size: 11px;
      color: var(--muted);
    }

    /* Two boxes side-by-side on desktop */
    @media (min-width: 860px){
      .panel.half{ grid-column: span 6; }
    }

    footer{
      margin-top: 18px;
      color: rgba(233,238,252,0.65);
      font-size: 10px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">padregames</div>
    </div>

    <div class="grid">
      <section class="panel half">
        <p>commited to your entertainment.</p>
      </section>

      <section class="panel half">
        <p>coming soon to an app store near you.</p>
      </section>
    </div>

    <footer>
      © <span id="y"></span> padregames. All rights reserved.
    </footer>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
